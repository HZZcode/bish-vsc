name: Publish

on: [ push, pull_request ]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set GH_TOKEN environment variable
        run: echo "GH_TOKEN=${{ secrets.GH_TOKEN }}" >> $GITHUB_ENV
        shell: bash

      - name: Publish VSCode extension project
        shell: bash
        run: |
          npm install
          npx @vscode/vsce package -o Bish-vsc.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bish-vsc.vsix
          path: Bish-vsc.vsix